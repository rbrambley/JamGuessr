<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JamGuessr — Game</title>
  <link rel="icon" type="image/svg+xml" href="assets/dj-kit-bg.svg">
  <link rel="shortcut icon" type="image/svg+xml" href="assets/dj-kit-bg.svg">
  <link rel="apple-touch-icon" href="assets/dj-kit-bg.svg">
  <link rel="stylesheet" href="css/styles.css?v=20260331-2">
</head>
<body>

  <div class="app-shell">
    <div class="app-header">
      <div class="app-header-top">
        <h1>JamGuessr</h1>
        <img class="app-graphic app-graphic-chip" src="assets/dj-kit-bg.svg" alt="" aria-hidden="true" loading="lazy" decoding="async">
      </div>
    </div>

    <div id="game-meta" class="meta-panel">
      <div id="player-name-display"></div>
      <div id="round-display"></div>
      <div id="points-display"></div>
      <div class="meta-label">Players and points</div>
      <div id="all-player-buttons" class="player-button-row"></div>
      <div id="meta-host-actions" class="meta-host-actions"></div>
      <div id="host-controls-inline" class="host-inline-controls"></div>
    </div>

    <!-- LOBBY -->
    <div id="view-lobby" class="view">
      <div id="room-code-display"></div>
      <div class="lobby-invite-actions">
        <button id="copy-room-btn" class="secondary-btn">Copy Code</button>
        <button id="copy-invite-btn" class="secondary-btn">Copy Invite</button>
      </div>
      <div id="lobby-invite-helper">Players can join with this code from the home screen.</div>
      <div id="lobby-waiting-text"></div>
      <ul id="player-list"></ul>
    </div>

    <!-- SONG PICKING -->
    <div id="view-picking" class="view">
      <p>Each round, every player submits exactly one song.</p>
      <div id="song-inputs"></div>
      <button id="submit-songs-btn">Submit Songs</button>
      <div id="waiting-msg" class="hidden">Waiting for other players...</div>
    </div>

    <!-- NOW PLAYING / GUESSING -->
    <div id="view-playing" class="view">
      <div id="now-playing-banner" class="now-playing-banner"></div>
      <div class="youtube-player-shell">
        <div id="youtube-player"></div>
        <button id="audio-unlock-btn" class="audio-unlock-btn" style="display:none">🔊 Tap to unmute</button>
        <div id="youtube-player-status" class="youtube-player-status"></div>
      </div>
      <p class="guess-hint">Guess who picked each song - you can change your answer any time before the reveal.</p>
      <div id="playlist-songs"></div>
    </div>

    <!-- ROUND REVEAL -->
    <div id="view-reveal" class="view">
      <div id="round-results"></div>
      <button id="next-round-btn">Next Round</button>
    </div>

    <!-- FINAL RESULTS -->
    <div id="view-final" class="view">
      <div id="final-podium"></div>
      <ul id="full-playlist"></ul>
      <div class="final-actions">
        <button id="play-again-btn">Play Again</button>
        <button id="end-game-btn" class="secondary-btn">End Game</button>
      </div>
    </div>

    <nav class="mobile-tab-bar" aria-label="Game navigation">
      <button type="button" class="mobile-tab" data-view="view-lobby">Lobby</button>
      <button type="button" class="mobile-tab" data-view="view-picking">Pick</button>
      <button type="button" class="mobile-tab" data-view="view-playing">Play</button>
      <button type="button" class="mobile-tab" data-view="view-reveal">Results</button>
    </nav>
  </div>

  <script>
    window.__JAMGUESSR_FIREBASE_API_KEY__ =
      window.__JAMGUESSR_FIREBASE_API_KEY__ || "AIzaSyCw4JX4m29X1-_ePlZlNW6DFX5Np41zvUw";
  </script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js?v=20260331-2"></script>
  <script src="js/api.js?v=20260331-2"></script>
  <script src="js/state.js?v=20260331-2"></script>
  <script src="js/game-logic.js?v=20260331-2"></script>
  <script src="js/ui.js?v=20260331-2"></script>

</body>
</html>
