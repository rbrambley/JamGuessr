<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JamGuessr Final Animation Preview</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --card-1: rgba(20, 26, 43, 0.96);
      --card-2: rgba(37, 47, 76, 0.92);
      --gold: #fbbf24;
      --gold-soft: #fde68a;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top, rgba(251, 191, 36, 0.14), transparent 28%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1));
      color: var(--text);
    }

    .preview-shell {
      width: min(720px, 100%);
      padding: 24px;
      border-radius: 28px;
      background: rgba(15, 23, 42, 0.68);
      border: 1px solid rgba(148, 163, 184, 0.12);
      box-shadow: 0 24px 80px rgba(2, 6, 23, 0.45);
    }

    .eyebrow {
      margin-bottom: 14px;
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .reveal-calculating {
      position: relative;
      overflow: hidden;
      margin: 8px auto 18px;
      padding: 20px 18px 18px;
      max-width: 560px;
      border-radius: 18px;
      border: 1px solid rgba(56, 189, 248, 0.34);
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.14), transparent 40%),
        linear-gradient(160deg, rgba(20, 26, 43, 0.92), rgba(31, 41, 55, 0.94));
      text-align: center;
      color: #cbd5e1;
      font-size: 0.95rem;
      box-shadow: 0 14px 40px rgba(14, 116, 144, 0.25);
    }

    .reveal-calculating::after {
      content: "";
      position: absolute;
      inset: -14%;
      pointer-events: none;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.46), rgba(56, 189, 248, 0.22) 34%, rgba(56, 189, 248, 0) 64%);
      opacity: 0;
      mix-blend-mode: screen;
      animation: revealScoreFlash 1.6s ease-out infinite;
    }

    .reveal-calculating-title {
      position: relative;
      z-index: 1;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      color: #67e8f9;
    }

    .reveal-calculating-copy {
      position: relative;
      z-index: 1;
      margin-top: 8px;
      color: #e2e8f0;
    }

    .reveal-calc-icon {
      display: inline-block;
      font-size: 1.05rem;
      margin-right: 6px;
      transform-origin: center;
      animation: revealCalcIconPulse 1.1s ease-in-out infinite;
    }

    .reveal-calculating-bars {
      position: relative;
      z-index: 1;
      margin: 14px auto 2px;
      display: inline-flex;
      align-items: flex-end;
      gap: 5px;
      height: 20px;
    }

    .reveal-calculating-bars span {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(180deg, #67e8f9, #22d3ee);
      box-shadow: 0 0 10px rgba(34, 211, 238, 0.45);
      animation: revealEqualizer 1s ease-in-out infinite;
    }

    .reveal-calculating-bars span:nth-child(1) { animation-delay: 0s; }
    .reveal-calculating-bars span:nth-child(2) { animation-delay: 0.12s; }
    .reveal-calculating-bars span:nth-child(3) { animation-delay: 0.24s; }
    .reveal-calculating-bars span:nth-child(4) { animation-delay: 0.36s; }
    .reveal-calculating-bars span:nth-child(5) { animation-delay: 0.48s; }

    .final-processing-shell {
      position: relative;
      overflow: hidden;
      margin-bottom: 18px;
      padding: 30px 18px 26px;
      border: 1px solid rgba(251, 191, 36, 0.35);
      border-radius: 22px;
      background:
        radial-gradient(circle at top, rgba(251, 191, 36, 0.16), transparent 38%),
        linear-gradient(160deg, var(--card-1), var(--card-2));
      text-align: center;
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.38);
    }

    .final-processing-shell::after {
      content: "";
      position: absolute;
      inset: -20%;
      pointer-events: none;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.38), rgba(255, 255, 255, 0) 58%);
      opacity: 0;
      animation: finalScoreFlash 2.4s ease-out infinite;
    }

    .final-processing-title {
      position: relative;
      z-index: 1;
      font-size: clamp(1.1rem, 2vw, 1.35rem);
      font-weight: 900;
      letter-spacing: 0.16em;
      color: var(--gold);
    }

    .final-processing-copy {
      position: relative;
      z-index: 1;
      margin-top: 10px;
      font-size: 1rem;
      color: var(--text);
    }

    .final-processing-burst {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .final-processing-burst span {
      position: absolute;
      left: 50%;
      top: 50%;
      font-size: 1.9rem;
      opacity: 0;
      color: var(--gold-soft);
      animation: finalMusicBurst 1.8s ease-out infinite;
      text-shadow: 0 0 18px rgba(253, 230, 138, 0.35);
    }

    .final-processing-burst span:nth-child(1) { --dx: -120px; --dy: -64px; animation-delay: 0s; }
    .final-processing-burst span:nth-child(2) { --dx: 126px; --dy: -52px; animation-delay: 0.18s; }
    .final-processing-burst span:nth-child(3) { --dx: -82px; --dy: 84px; animation-delay: 0.36s; }
    .final-processing-burst span:nth-child(4) { --dx: 88px; --dy: 96px; animation-delay: 0.54s; }
    .final-processing-burst span:nth-child(5) { --dx: 0px; --dy: -112px; animation-delay: 0.72s; }
    .final-processing-burst span:nth-child(6) { --dx: 0px; --dy: 118px; animation-delay: 0.9s; }

    .note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    @keyframes finalMusicBurst {
      0% {
        transform: translate(-50%, -50%) scale(0.2) rotate(0deg);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.2) rotate(24deg);
        opacity: 0;
      }
    }

    @keyframes revealCalcIconPulse {
      0%, 100% { transform: scale(1) rotate(0deg); }
      35% { transform: scale(1.18) rotate(-6deg); }
      70% { transform: scale(1.08) rotate(6deg); }
    }

    @keyframes revealEqualizer {
      0%, 100% { height: 6px; opacity: 0.72; }
      50% { height: 18px; opacity: 1; }
    }

    @keyframes revealScoreFlash {
      0%, 100% { opacity: 0; transform: scale(0.84); }
      8% { opacity: 0.82; transform: scale(1.02); }
      18% { opacity: 0.22; transform: scale(1.08); }
      52% { opacity: 0.54; transform: scale(0.98); }
      64% { opacity: 0.12; transform: scale(1.12); }
    }

    @keyframes finalScoreFlash {
      0%, 54%, 100% {
        opacity: 0;
        transform: scale(0.86);
      }
      10% {
        opacity: 0.75;
        transform: scale(1.02);
      }
      22% {
        opacity: 0.18;
        transform: scale(1.08);
      }
      66% {
        opacity: 0.45;
        transform: scale(0.98);
      }
      78% {
        opacity: 0.08;
        transform: scale(1.1);
      }
    }
  </style>
</head>
<body>
  <main class="preview-shell">
    <div class="eyebrow">JamGuessr Animation Preview</div>
    <div class="reveal-calculating">
      <div class="reveal-calculating-title">SCORES INCOMING</div>
      <div class="reveal-calculating-copy"><span class="reveal-calc-icon">🎚️</span>Processing guesses and updating scores.</div>
      <div class="reveal-calculating-bars" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
    <div class="final-processing-shell">
      <div class="final-processing-burst" aria-hidden="true">
        <span>♪</span><span>♫</span><span>♬</span><span>♪</span><span>♩</span><span>♫</span>
      </div>
      <div class="final-processing-title">FINAL SCORES INCOMING</div>
      <div class="final-processing-copy">The final scores are dropping... cue the confetti cannons.</div>
    </div>
    <div class="note">This is the standalone preview of the new final-processing animation before the podium appears.</div>
  </main>
</body>
</html>
