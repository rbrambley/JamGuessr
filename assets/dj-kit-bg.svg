<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(520 560) rotate(90) scale(360)">
      <stop stop-color="#F97316" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1400 560) rotate(90) scale(360)">
      <stop stop-color="#FBBF24" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mixerLine" x1="960" y1="180" x2="960" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#93C5FD" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#93C5FD" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="transparent"/>
  <rect width="1920" height="1080" fill="url(#glowLeft)"/>
  <rect width="1920" height="1080" fill="url(#glowRight)"/>

  <!-- Left deck (raised for visibility) -->
  <circle cx="520" cy="580" r="210" stroke="#E2E8F0" stroke-opacity="0.28" stroke-width="2"/>
  <circle cx="520" cy="580" r="152" stroke="#F97316" stroke-opacity="0.34" stroke-width="2"/>
  <circle cx="520" cy="580" r="24" stroke="#F8FAFC" stroke-opacity="0.3" stroke-width="2"/>

  <!-- Right deck (raised for visibility) -->
  <circle cx="1400" cy="580" r="210" stroke="#E2E8F0" stroke-opacity="0.28" stroke-width="2"/>
  <circle cx="1400" cy="580" r="152" stroke="#FBBF24" stroke-opacity="0.34" stroke-width="2"/>
  <circle cx="1400" cy="580" r="24" stroke="#F8FAFC" stroke-opacity="0.3" stroke-width="2"/>

  <!-- Mixer body (raised + widened) -->
  <rect x="805" y="220" width="310" height="520" rx="20" stroke="#64748B" stroke-opacity="0.34" stroke-width="2"/>

  <!-- Mixer channels -->
  <line x1="882" y1="255" x2="882" y2="700" stroke="url(#mixerLine)" stroke-width="2"/>
  <line x1="960" y1="255" x2="960" y2="700" stroke="url(#mixerLine)" stroke-width="2"/>
  <line x1="1038" y1="255" x2="1038" y2="700" stroke="url(#mixerLine)" stroke-width="2"/>

  <!-- Knobs -->
  <circle cx="882" cy="308" r="11" stroke="#F8FAFC" stroke-opacity="0.26" stroke-width="2"/>
  <circle cx="960" cy="308" r="11" stroke="#F8FAFC" stroke-opacity="0.26" stroke-width="2"/>
  <circle cx="1038" cy="308" r="11" stroke="#F8FAFC" stroke-opacity="0.26" stroke-width="2"/>
  <circle cx="882" cy="365" r="11" stroke="#F8FAFC" stroke-opacity="0.26" stroke-width="2"/>
  <circle cx="960" cy="365" r="11" stroke="#F8FAFC" stroke-opacity="0.26" stroke-width="2"/>
  <circle cx="1038" cy="365" r="11" stroke="#F8FAFC" stroke-opacity="0.26" stroke-width="2"/>

  <!-- Faders -->
  <rect x="872" y="448" width="20" height="180" rx="10" fill="#94A3B8" fill-opacity="0.14"/>
  <rect x="950" y="476" width="20" height="152" rx="10" fill="#94A3B8" fill-opacity="0.14"/>
  <rect x="1028" y="430" width="20" height="198" rx="10" fill="#94A3B8" fill-opacity="0.14"/>

  <!-- Ambient wave lines -->
  <path d="M80 155C410 95 650 175 930 150C1210 125 1500 85 1840 130" stroke="#F97316" stroke-opacity="0.26" stroke-width="2"/>
  <path d="M60 900C420 845 820 930 1180 878C1460 838 1700 870 1870 842" stroke="#FBBF24" stroke-opacity="0.24" stroke-width="2"/>
</svg>
